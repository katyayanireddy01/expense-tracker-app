<!DOCTYPE html>
<html>
<head>
    <title>Summary</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<a href="{{ url_for('home') }}" class="back-btn">← Back</a>

<div class="container card">
<div class="container card">
    <h1>Expense Summary</h1>

    <form method="GET" style="margin-bottom:20px;">
        <label>Month / Year</label>
        <input type="month" name="month_year"
               value="{{ '%04d-%02d'|format(selected_year, selected_month) }}"
               onchange="goToMonth(this.value)">
    </form>

    <div class="status-card" style="border-left:6px solid {{ budget_color }};">
        <h3>Total Spent: ₹{{ total_spent }}</h3>
        <h3>Budget: ₹{{ budget_amount }}</h3>
        <h2 style="color:{{ budget_color }}">{{ budget_status }}</h2>
    </div>

    <canvas id="pieChart"></canvas>
    <canvas id="barChart" style="margin-top:30px;"></canvas>
</div>

<script>
function goToMonth(value){
    const [year, month] = value.split('-');
    window.location.href = `/summary?month=${parseInt(month)}&year=${parseInt(year)}`;
}

new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: {{ labels|tojson }},
        datasets: [{ data: {{ values|tojson }} }]
    }
});

new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: {{ bar_labels|tojson }},
        datasets: [{ data: {{ bar_values|tojson }} }]
    }
});
</script>
</body>
</html>
