<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/animations.css">
</head>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
}
</script>
<body>

<!-- THEME TOGGLE (ONLY FIRST TIME) -->
<button id="themeToggle" class="theme-toggle" onclick="setTheme()">
    🌙 Choose Theme
</button>

<div class="container">
  <div class="card">
    <h1>💸 Expense Tracker</h1>

    <a class="btn" href="/add">➕ Add Expense</a><br><br>
    <a class="btn" href="/summary">📊 Summary</a><br><br>
    <a class="btn" href="/budget">💰 Budget</a>
  </div>
</div>
<script>
(function () {

    const theme = localStorage.getItem("theme");
    const locked = localStorage.getItem("themeLocked");
    const toggleBtn = document.getElementById("themeToggle");

    // 1️⃣ If theme already locked → apply & hide toggle
    if (locked === "true" && theme) {
        document.body.classList.toggle("dark", theme === "dark");
        if (toggleBtn) toggleBtn.style.display = "none";
        return;
    }

    // 2️⃣ If not locked → auto-detect system theme
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.body.classList.toggle("dark", prefersDark);

    // 3️⃣ User selects theme (ONLY ONCE)
    window.setTheme = function () {
        const isDark = document.body.classList.toggle("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");
        localStorage.setItem("themeLocked", "true");

        // Hide toggle permanently
        toggleBtn.style.display = "none";
    };

})();
</script>
</body>
</html>
