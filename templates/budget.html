<!DOCTYPE html>
<html>
<head>
    <title>Budget</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<a href="{{ url_for('home') }}" class="back-btn">← Back</a>

<div class="container card">
<div class="container card">
    <h1>Budget Portal</h1>

    <form method="POST">
        <label>Month</label>
        <input type="month" id="monthPicker"
               value="{{ '%04d-%02d'|format(selected_year, selected_month) }}"
               onchange="syncMonthYear(this.value)">

        <input type="hidden" name="month" id="month" value="{{ selected_month }}">
        <input type="hidden" name="year" id="year" value="{{ selected_year }}">

        <label>Budget Amount</label>
        <input type="number" step="0.01" name="budget_amount"
               placeholder="Enter monthly budget"
               value="{{ saved_budget }}" required>

        <button type="submit">Save Budget</button>
    </form>

    {% if saved_budget %}
    <div class="status-card" style="margin-top:20px;">
        Saved Budget: ₹{{ saved_budget }}
    </div>
    {% endif %}
</div>

<script>
function syncMonthYear(value){
    const [year, month] = value.split('-');
    document.getElementById('month').value = parseInt(month);
    document.getElementById('year').value = parseInt(year);
}
</script>
</body>
</html>
